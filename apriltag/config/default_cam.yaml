# Camera calibration file for AprilTag detection node.
#
# Calibrated: 2026-04-08
# Camera:     IMX296 global shutter CSI, 1280x720, RGB888
# Checkerboard: 8x5 interior corners, 24mm squares
# RMS reprojection error: see calibration session output
#
# The apriltag node reads only 'camera_matrix.data' and
# 'distortion_coefficients.data' from this file.

image_width: 1280
image_height: 720
camera_name: imx296

# Intrinsic camera matrix (row-major, 3x3):
#   [fx,  0, cx,
#     0, fy, cy,
#     0,  0,  1]
# fx=1551.157  fy=1547.374  cx=663.415  cy=341.480
camera_matrix:
  rows: 3
  cols: 3
  data: [1551.15677,    0.       ,  663.41499,
            0.       , 1547.37438,  341.4802 ,
            0.       ,    0.       ,    1.       ]

# Distortion model (plumb_bob = standard radial+tangential)
distortion_model: plumb_bob

# Distortion coefficients [k1, k2, p1, p2, k3]
distortion_coefficients:
  rows: 1
  cols: 5
  data: [-0.458869, 0.235027, 0.003951, 0.000773, 0.000000]

# Rectification matrix (identity for monocular cameras)
rectification_matrix:
  rows: 3
  cols: 3
  data: [1., 0., 0.,
         0., 1., 0.,
         0., 0., 1.]

# Projection matrix (3x4)
projection_matrix:
  rows: 3
  cols: 4
  data: [1420.0509 ,    0.       ,  668.23382,    0.       ,
            0.       , 1505.96118,  341.12261,    0.       ,
            0.       ,    0.       ,    1.       ,    0.       ]
